<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXUS AI SOLUTIONS</title>
  <link rel="stylesheet" href="./style.css">
  <!-- done! -->
</head>

<body>

  <header class="hero">
    <video autoplay muted loop playsinline id="hero-video"> <!--playsinline is important for video playback on mobile-->
      <source src="hero-video-ai.mp4" type="video/mp4">
      Din webbläsare stödjer inte video-taggen. <!--remove this line? -->
    </video>
    <div class="hero-content">
      <h1>Unlock the Power of Neural Intelligence</h1>
      <p>Join our exlusive beta program and shape the future of Nexus AI.</p>
      <a href="#beta-form" class="cta-btn">Get Started</a> <!--vad gör denna länk?-->
    </div>
  </header>

  <main>
    <section class="form-container">
      <h2>Beta Access Applications</h2>
      <p>Fill out the credentials to initialize your neural sync.</p>

      <form action="https://httpbin.org/anything" method="POST">

        <div class="form-group">
          <label for="username">Identity Name</label>
          <input type="text" name="user_name" id="user_name" required placeholder="e.g. Nexus-7">
        </div>

        <div class="form-group">
          <label for="user_email">Neural-Link Email</label>
          <input type="email" name="user_email" id="user_email" required placeholder="name@nexus.ai">
        </div>

        <div class="form-group">
          <label for="secure_code">Secure Access Token</label>
          <input type="password" name="secure_code" id="secure_code" required>
        </div>

        <fieldset>
          <legend>Select Neural Module</legend>
          <div class="radio-group">
            <label><input type="radio" name="module" value="core" checked> Core</label>
            <label><input type="radio" name="module" value="vision"> Vision</label>
            <label><input type="radio" name="module" value="logic"> Logic</label>
          </div>
        </fieldset>

        <fieldset>
          <legend>Priority Updates</legend>
          <div class="checkbox-group">
            <label><input type="checkbox" name="interest" value="space-tech"> Space Tech</label>
            <label><input type="checkbox" name="interest" value="deep-learning"> Deep Learning</label>
          </div>
        </fieldset>

        <button type="submit" class="submit-btn">Initialize Sync</button>
      </form>
    </section>

  </main>

</body>

</html>
